<div class="container mt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/admin/course/{{ lesson['MaHocPhan'] }}">Quay lại học phần</a></li>
            <li class="breadcrumb-item active">Quản lý tài liệu bài {{ lesson['ThuTu'] }}</li>
        </ol>
    </nav>

    <h3>Quản lý tài liệu: {{ lesson['TenBaiHoc'] }}</h3>

    <div class="card my-4">
        <div class="card-body">
            <form action="/admin/add_document" method="POST" class="row g-3">
                <input type="hidden" name="ma_bai_hoc" value="{{ lesson['MaBaiHoc'] }}">
                <div class="col-md-5">
                    <input type="text" name="ten_tl" class="form-control" placeholder="Tên tài liệu" required>
                </div>
                <div class="col-md-5">
                    <input type="text" name="noi_dung" class="form-control" placeholder="Link/Mô tả">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Thêm</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Tên tài liệu</th>
                <th>Nội dung</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in documents %}
            <tr>
                <td>{{ doc['TenTaiLieu'] }}</td>
                <td>{{ doc['NoiDung'] }}</td>
                <td>
                    <a href="/delete/{{ doc['id'] }}" class="text-danger" onclick="return confirm('Xóa?')">Xóa</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
